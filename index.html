<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IR Calc - Imposto de Renda</title>

    <link rel="stylesheet" href="./CSS/mat.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header class="faixa-topo">
    <img src="./img/sesisenai.png" height="50">
    <img src="./img/logo.IR.png" height="205">
</header>

<main>
    <div class="caixa">

        <h2>Calculadora IRRF</h2>

        <div class="input-group">
            <label>Salário Bruto (R$):</label>
            <input type="number" id="salario">
        </div>

        <div class="input-group">
            <label>Pensão Alimentícia (R$):</label>
            <input type="number" id="pensao" value="0">
        </div>

        <div class="input-group">
            <label>Dependentes:</label>
            <input type="number" id="dep" value="0">
        </div>

        <button onclick="calcular()">Calcular</button>

        <div class="resultado" id="resultado">
            Preencha os dados e clique em calcular
        </div>

        <canvas id="grafico"></canvas>

    </div>
</main>

<footer class="main-footer">
    <div class="footer-section left">
        <img src="./img/sesisenai.png" height="50">
    </div>

    <div class="footer-section center">
        <div class="creditos">
            <p>Produzido por: Maria Eduarda, Mylena, Nicole e Guilherme.</p>
            <p>Professores Responsáveis: Anderson e Valter</p>
            <p>© 2026 IR Calc</p>
        </div>
    </div>

    <div class="footer-section right">
        <img src="./img/logo.IR.png" height="150">
    </div>
</footer>

<script src="./js/script.js"></script>

</body>
</html>
